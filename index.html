<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1419" />
    <title>한빛증권 — 데모</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-bg" aria-hidden="true"></div>

    <!-- 로그인 -->
    <section id="view-login" class="view view-login" data-view="login" hidden>
      <div class="login-card">
        <div class="login-brand">
          <span class="login-logo" aria-hidden="true"></span>
          <div>
            <h1>한빛증권</h1>
            <p class="login-sub">시세 · 매매 · AI 인사이트</p>
          </div>
        </div>
        <form id="loginForm" class="login-form" autocomplete="on">
          <label class="field">
            <span>아이디</span>
            <input id="loginId" name="username" type="text" placeholder="데모: 아무 값" required />
          </label>
          <label class="field">
            <span>비밀번호</span>
            <input id="loginPw" name="password" type="password" placeholder="데모: 아무 값" required />
          </label>
          <button type="submit" class="btn btn-primary btn-block">로그인</button>
        </form>
        <p class="login-disclaimer">교육용 데모입니다. 실제 거래·투자에 사용할 수 없습니다.</p>
      </div>
    </section>

    <!-- 앱 셸 (로그인 후) -->
    <div id="appShell" class="app-shell" hidden>
      <header class="top-bar">
        <div class="top-bar-title">
          <span class="top-bar-mark" aria-hidden="true"></span>
          <div>
            <strong id="screenTitle">시세</strong>
            <span class="top-bar-user" id="userGreeting"></span>
          </div>
        </div>
        <div class="top-bar-actions">
          <button type="button" class="btn btn-ghost btn-sm" id="btnLogout" title="로그아웃">나가기</button>
        </div>
      </header>

      <!-- 시세 -->
      <main id="view-home" class="view view-main" data-view="home">
        <div class="panel search-panel">
          <form id="addForm" class="inline-form" autocomplete="off">
            <input
              id="symbolInput"
              type="text"
              placeholder="종목 심볼 (예: 005930.KS, AAPL)"
              spellcheck="false"
            />
            <button type="submit" class="btn btn-primary btn-sm">추가</button>
          </form>
          <p class="hint">한국 <code>.KS</code> · 미국 티커 — Yahoo Finance와 동일</p>
        </div>
        <div id="status" class="status" role="status" aria-live="polite"></div>
        <ul id="watchlist" class="watchlist"></ul>
      </main>

      <!-- 매수 -->
      <main id="view-buy" class="view view-main" data-view="buy" hidden>
        <div class="panel">
          <h2 class="panel-title">주식 매수</h2>
          <form id="buyForm" class="stack-form">
            <label class="field">
              <span>종목 심볼</span>
              <input name="symbol" type="text" placeholder="005930.KS" required />
            </label>
            <label class="field">
              <span>수량</span>
              <input name="qty" type="number" min="1" step="1" placeholder="10" required />
            </label>
            <fieldset class="radio-row">
              <legend class="sr-only">주문 유형</legend>
              <label class="chip"><input type="radio" name="buyType" value="market" checked /> 시장가</label>
              <label class="chip"><input type="radio" name="buyType" value="limit" /> 지정가</label>
            </fieldset>
            <label class="field" id="buyLimitWrap" hidden>
              <span>지정가 (원/달러)</span>
              <input name="limitPrice" type="number" min="0" step="0.01" placeholder="0" />
            </label>
            <button type="submit" class="btn btn-buy btn-block">매수 주문 (데모)</button>
          </form>
        </div>
      </main>

      <!-- 매도 -->
      <main id="view-sell" class="view view-main" data-view="sell" hidden>
        <div class="panel">
          <h2 class="panel-title">주식 매도</h2>
          <form id="sellForm" class="stack-form">
            <label class="field">
              <span>종목 심볼</span>
              <input name="symbol" type="text" placeholder="035420.KS" required />
            </label>
            <label class="field">
              <span>수량</span>
              <input name="qty" type="number" min="1" step="1" placeholder="5" required />
            </label>
            <fieldset class="radio-row">
              <legend class="sr-only">주문 유형</legend>
              <label class="chip"><input type="radio" name="sellType" value="market" checked /> 시장가</label>
              <label class="chip"><input type="radio" name="sellType" value="limit" /> 지정가</label>
            </fieldset>
            <label class="field" id="sellLimitWrap" hidden>
              <span>지정가 (원/달러)</span>
              <input name="limitPrice" type="number" min="0" step="0.01" placeholder="0" />
            </label>
            <button type="submit" class="btn btn-sell btn-block">매도 주문 (데모)</button>
          </form>
        </div>
      </main>

      <!-- AI -->
      <main id="view-ai" class="view view-main" data-view="ai" hidden>
        <div class="panel ai-hero">
          <div class="ai-badge">AI 인사이트</div>
          <p class="ai-lead">관심 종목 시세를 바탕으로 요약합니다. 투자 권유가 아닙니다.</p>
          <button type="button" class="btn btn-primary btn-sm" id="btnAiRefresh">다시 분석</button>
        </div>
        <div id="aiContent" class="ai-content">
          <p class="muted">시세를 불러온 뒤 여기에 분석이 표시됩니다.</p>
        </div>
      </main>

      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

      <!-- 음성: 버튼 누른 뒤 한 번 발화 → 화면 이동 -->
      <div class="voice-dock">
        <button type="button" class="voice-fab" id="btnVoice" aria-pressed="false" title="누른 뒤 화면 이름을 말하세요">
          <span class="voice-fab-icon" aria-hidden="true"></span>
          <span class="voice-fab-label">음성 이동</span>
        </button>
        <p id="voiceHint" class="voice-hint muted">탭 후 「시세」「매수」「매도」「AI」「로그인」 등</p>
      </div>

      <nav class="tab-bar" aria-label="주 메뉴">
        <button type="button" class="tab" data-go="home" aria-current="page">
          <span class="tab-icon tab-icon--chart" aria-hidden="true"></span>
          시세
        </button>
        <button type="button" class="tab" data-go="buy">
          <span class="tab-icon tab-icon--buy" aria-hidden="true"></span>
          매수
        </button>
        <button type="button" class="tab" data-go="sell">
          <span class="tab-icon tab-icon--sell" aria-hidden="true"></span>
          매도
        </button>
        <button type="button" class="tab" data-go="ai">
          <span class="tab-icon tab-icon--ai" aria-hidden="true"></span>
          AI
        </button>
      </nav>
    </div>

    <script src="app.js" type="module"></script>
  </body>
</html>
